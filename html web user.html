<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Library Loan System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">📚 Library Loan System</h1>
            <ul class="nav-menu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="members.html" class="active">Members</a></li>
                <li><a href="loans.html">Loans</a></li>
                <li><a href="returns.html">Returns</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h2>👥 Member Management</h2>
        
        <!-- CREATE Member Form -->
        <div class="form-card">
            <h3>➕ Register New Member</h3>
            <form id="addMemberForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="memberName" required placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="memberEmail" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="memberPhone" placeholder="Phone number">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="memberAddress" rows="2" placeholder="Full address"></textarea>
                </div>
                <button type="submit" class="btn-primary">➕ Register Member</button>
            </form>
        </div>

        <!-- READ Members Table with UPDATE/DELETE -->
        <div class="table-card">
            <h3>📋 Library Members</h3>
            <input type="text" id="searchMember" placeholder="🔍 Search by name, email, or phone..." class="search-input">
            <div class="table-container">
                <table id="membersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Join Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membersTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- EDIT Modal Popup -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>✏️ Edit Member</h3>
            <form id="editMemberForm">
                <input type="hidden" id="editMemberId">
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="form-group">
                    <label>Phone:</label>
                    <input type="tel" id="editPhone">
                </div>
                <div class="form-group">
                    <label>Address:</label>
                    <textarea id="editAddress" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Status:</label>
                    <select id="editStatus">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">💾 Update Member</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/members.js"></script>
</body>
</html>
