<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loan Management - Library System</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">📚 Library Loan System</h1>
            <ul class="nav-menu">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="members.html">Members</a></li>
                <li><a href="loans.html" class="active">Loans</a></li>
                <li><a href="returns.html">Returns</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h2>📋 Borrow Books (Create Loan)</h2>

        <div class="form-card">
            <h3>Issue New Loan</h3>
            <form id="addLoanForm">
                <div class="form-group">
                    <label>Select Member:</label>
                    <select id="loanMemberId" required>
                        <option value="">Select Member</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Book:</label>
                    <select id="loanBookId" required>
                        <option value="">Select Book</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Due Date (14 days from today):</label>
                    <input type="date" id="dueDate" required />
                </div>
                <button type="submit" class="btn-primary">Issue Book</button>
            </form>
        </div>

        <div class="table-card">
            <h3>Active Loans</h3>
            <div class="table-container">
                <table id="activeLoansTable">
                    <thead>
                        <tr>
                            <th>Loan ID</th>
                            <th>Member</th>
                            <th>Book Title</th>
                            <th>Loan Date</th>
                            <th>Due Date</th>
                            <th>Days Left</th>
                        </tr>
                    </thead>
                    <tbody id="activeLoansBody">
                        <tr>
                            <td colspan="6" style="text-align: center">Loading loans...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/config.js"></script>
    <script src="js/loans.js"></script>
</body>

</html>
